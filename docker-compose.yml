version: "3.9"

services:
  app:
    build: .
    container_name: sims4lots-app
    working_dir: /var/www/html
    ports:
      - "8000:8000"   # Laravel dev server
      - "5173:5173"   # Vite dev server
    depends_on:
      - mysql
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: sims_lots
      DB_USERNAME: root
      DB_PASSWORD: root
    command: >
      sh -c "
        composer install &&
        php artisan key:generate --force &&
        php artisan migrate --force || true &&
        npm install &&
        composer dev
      "

  mysql:
    image: mysql:8.0
    container_name: sims4lots-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sims_lots
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:

